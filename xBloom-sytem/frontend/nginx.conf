server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers (applied to the SPA document via location /) ──
  server_tokens off;                      # hide nginx version
  add_header X-Frame-Options "DENY" always;                       # anti-clickjacking
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # CSP: scripts/styles/data only from self; blocks inline scripts (XSS) and
  # cross-origin exfiltration (connect-src 'self'); no framing.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  # Enable HSTS only after TLS is terminated at this edge (HTTPS):
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Proxy API calls to the api service (same origin → no CORS).
  # The trailing slash strips the /api prefix: /api/auth/login → /auth/login.
  location /api/ {
    proxy_pass http://api:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
    # Allow large bodies: video uploads (≤60MB) and Shopee screenshot payloads.
    client_max_body_size 80m;
  }

  # SPA fallback — every client route resolves to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the entry HTML or the build marker, so clients pick up new
  # builds immediately (the app auto-reloads when /__build changes).
  location = /index.html {
    add_header Cache-Control "no-store";
  }
  location = /__build {
    default_type text/plain;
    add_header Cache-Control "no-store";
  }

  # Long-cache hashed build assets (filenames change per build).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
