services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Bound to localhost only — not exposed to the LAN.
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: ${API_PORT:-8080}
      NODE_ENV: ${NODE_ENV:-development}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      UPLOAD_DIR: uploads
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      # Shopee export (optional Google Sheet/Drive mirror; DB save always works)
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      SHOPEE_SHEET_ID: ${SHOPEE_SHEET_ID:-}
      SHOPEE_SHEET_TAB: ${SHOPEE_SHEET_TAB:-Orders}
      SHOPEE_DRIVE_FOLDER_ID: ${SHOPEE_DRIVE_FOLDER_ID:-}
      SHOPEE_API_KEY: ${SHOPEE_API_KEY:-}
    # Bound to localhost only — the LAN reaches the API via the frontend's /api proxy.
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/backend/uploads
      # To enable the Google Sheet mirror, place the service-account key at
      # ./shopee-service-account.json, uncomment the line below, and set
      # GOOGLE_APPLICATION_CREDENTIALS=/app/backend/shopee-service-account.json
      # - ./shopee-service-account.json:/app/backend/shopee-service-account.json:ro
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Browser calls same-origin /api; Vite proxies it to the api container.
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://api:8080
      # Where Vite looks for the TLS cert (mounted below). Present → HTTPS.
      VITE_CERT_DIR: /app/certs
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      # Self-signed TLS cert → HTTPS → secure context → live camera scanner on LAN.
      # Generate/replace via frontend/certs (see certs/san.cnf). Read-only.
      - ./frontend/certs:/app/certs:ro
    depends_on:
      - api

volumes:
  mysql_data:
  uploads_data:
