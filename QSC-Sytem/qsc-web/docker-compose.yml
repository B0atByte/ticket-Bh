services:
  # เว็บแอป PHP (เซิร์ฟเวอร์ในตัวของ PHP) + ฐานข้อมูล SQLite ในไฟล์เดียว
  web:
    image: php:8.3-cli-alpine
    container_name: qsc_web
    working_dir: /var/www/html
    command: >
      php -d display_errors=0
          -d date.timezone=Asia/Bangkok
          -S 0.0.0.0:80 -t /var/www/html
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html          # โค้ด
      - qsc_data:/data            # ไฟล์ฐานข้อมูล SQLite (อยู่นอก web root)
    environment:
      DB_PATH: /data/qsc.sqlite
      TZ: Asia/Bangkok
      PHP_CLI_SERVER_WORKERS: "4"
      # แจ้งเตือน Discord — ใส่ webhook URL ของตัวเองใน .env (ปล่อยว่างเพื่อปิด)
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}
      # Shared secret ที่ต้องแนบใน header X-Dashboard-Key เพื่อเรียก get_issues.php (ใช้โดย issues-dashboard)
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      # ปลายทางกลางที่ปุ่ม "แจ้งปัญหา" ยิง POST ไปตรงๆ จาก browser (client-side, ไม่ใช่ server-to-server — ค่า default ใช้ localhost ได้เลยตอน dev)
      ISSUE_SERVICE_URL: ${ISSUE_SERVICE_URL:-http://localhost:4003}
    restart: unless-stopped

volumes:
  qsc_data:
