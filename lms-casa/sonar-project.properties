sonar.projectKey=lms-casa
sonar.projectName=LMS Casa
sonar.projectVersion=1.0
sonar.host.url=http://sonarqube:9000

# Sources to analyse (server + client)
sonar.sources=server/src,client/src
sonar.tests=server/src,client/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclude generated / build output / migrations / e2e specs
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/prisma/migrations/**,**/tests/e2e/**,**/*.d.ts

# JS/TS coverage from vitest lcov reporters
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info
sonar.typescript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info

# Language / encoding
sonar.sourceEncoding=UTF-8

# Authentication token — pass at scan time via -Dsonar.token=<token>
# Generate one at http://localhost:9000/account/security after first login.
