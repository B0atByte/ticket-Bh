services:
  mysql:
    image: mysql:8.0
    container_name: bhlogistics-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bhlogistics2024
      MYSQL_DATABASE: bhlogistics
      MYSQL_USER: bhuser
      MYSQL_PASSWORD: bhpassword2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbhlogistics2024"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bhlogistics-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: bhlogistics2024
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
